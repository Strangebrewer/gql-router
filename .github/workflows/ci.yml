name: CI/CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, dev]

env:
  PROJECT_ID: personal-enterprise-493003
  REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/personal-enterprise-493003/personal-enterprise/gql-router
  WIF_PROVIDER: projects/213672305641/locations/global/workloadIdentityPools/github-actions/providers/github-actions-provider
  SERVICE_ACCOUNT: personal-enterprise-run@personal-enterprise-493003.iam.gserviceaccount.com

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Install rover
        run: |
          curl -sSL https://rover.apollo.dev/nix/latest | sh
          echo "$HOME/.rover/bin" >> $GITHUB_PATH

      - name: Compose supergraph schema
        env:
          SUBGRAPH_HOME_MAINTENANCE_URL: ${{ vars.SUBGRAPH_HOME_MAINTENANCE_URL }}
          SUBGRAPH_RECIPES_URL: ${{ vars.SUBGRAPH_RECIPES_URL }}
          SUBGRAPH_PROJECT_MGR_URL: ${{ vars.SUBGRAPH_PROJECT_MGR_URL }}
        run: |
          envsubst < supergraph.yaml > supergraph-resolved.yaml
          rover supergraph compose \
            --config supergraph-resolved.yaml \
            --output supergraph-schema.graphql \
            --elv2-license accept

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy gql-router-dev \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --max-instances 2 \
            --service-account ${{ env.SERVICE_ACCOUNT }} \
            --set-env-vars SUBGRAPH_HOME_MAINTENANCE_URL=${{ vars.SUBGRAPH_HOME_MAINTENANCE_URL }},SUBGRAPH_RECIPES_URL=${{ vars.SUBGRAPH_RECIPES_URL }},SUBGRAPH_PROJECT_MGR_URL=${{ vars.SUBGRAPH_PROJECT_MGR_URL }} \
            --allow-unauthenticated

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Install rover
        run: |
          curl -sSL https://rover.apollo.dev/nix/latest | sh
          echo "$HOME/.rover/bin" >> $GITHUB_PATH

      - name: Compose supergraph schema
        env:
          SUBGRAPH_HOME_MAINTENANCE_URL: ${{ vars.SUBGRAPH_HOME_MAINTENANCE_URL }}
          SUBGRAPH_RECIPES_URL: ${{ vars.SUBGRAPH_RECIPES_URL }}
          SUBGRAPH_PROJECT_MGR_URL: ${{ vars.SUBGRAPH_PROJECT_MGR_URL }}
        run: |
          envsubst < supergraph.yaml > supergraph-resolved.yaml
          rover supergraph compose \
            --config supergraph-resolved.yaml \
            --output supergraph-schema.graphql \
            --elv2-license accept

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy gql-router \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --max-instances 2 \
            --service-account ${{ env.SERVICE_ACCOUNT }} \
            --set-env-vars SUBGRAPH_HOME_MAINTENANCE_URL=${{ vars.SUBGRAPH_HOME_MAINTENANCE_URL }},SUBGRAPH_RECIPES_URL=${{ vars.SUBGRAPH_RECIPES_URL }},SUBGRAPH_PROJECT_MGR_URL=${{ vars.SUBGRAPH_PROJECT_MGR_URL }} \
            --allow-unauthenticated
